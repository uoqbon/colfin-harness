name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege: the test job only needs to read the repository.
# NOTE: this uses `pull_request` (NOT `pull_request_target`) on purpose, so that
# pull requests opened from forks run WITHOUT access to repository secrets.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests (Python 3.12)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        # actions/checkout v6.0.3
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Install uv
        # astral-sh/setup-uv v8.2.0
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990
        with:
          enable-cache: true

      - name: Install Python (3.12, per .python-version)
        run: uv python install

      - name: Install dependencies
        run: uv sync

      # The suite is offline and fixture-only — no live session, network, or model
      # is needed — so Playwright browsers are intentionally NOT installed here.
      # The guard tests below are the critical invariant checks:
      #   - tests/test_order_entry_guard.py  (the harness never submits an order)
      #   - tests/test_model_selection.py    (model locked to the Gemma-on-MLX family)
      - name: Run tests
        run: uv run pytest
