version: 2
updates:
  # Python dependencies. This project is managed with uv (pyproject.toml + uv.lock),
  # so the "uv" ecosystem is the correct one for keeping deps up to date.
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "deps"

  # GitHub Actions used by the CI workflow (pinned to commit SHAs).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "ci"
